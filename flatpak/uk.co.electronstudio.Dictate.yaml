app-id: uk.co.electronstudio.Dictate
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: dictate
separate-locales: false
finish-args:
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --socket=pulseaudio
  - --device=all
  - --talk-name=org.freedesktop.Notifications
  # System tray (StatusNotifierItem/AppIndicator over DBus). Needed so the
  # tray icon can register itself and talk to the host; without these the icon
  # is invisible inside the sandbox.
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=org.kde.StatusNotifierItem.*
build-options:
  no-debuginfo: true
  append-path: /usr/lib/sdk/golang/bin
  env:
    GOFLAGS: "-buildvcs=false -mod=vendor"
    GO_LDFLAGS: "-s -w"
    GOCACHE: /run/build/dictate/.gocache
    GOPATH: /run/build/dictate/.gopath
    GOMODCACHE: /run/build/dictate/.gopath/pkg/mod
cleanup:
  - /include
  - /lib/cmake
  - /share/pkgconfig
  - /share/man
  - /share/bash-completion
  - /share/zsh
modules:
  - name: spirv-headers
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_INSTALL_PREFIX=/app
    sources:
      - type: git
        url: https://github.com/KhronosGroup/SPIRV-Headers.git
        tag: vulkan-sdk-1.4.321.0
        commit: 2a611a970fdbc41ac2e3e328802aed9985352dca
  - name: wl-clipboard
    buildsystem: meson
    config-opts:
      - -Dfishcompletiondir=no
    sources:
      - type: git
        url: https://github.com/bugaevc/wl-clipboard.git
        tag: v2.3.0
        commit: 67a7b937895bceec1ae5ccebb10216f63f70ca1b
  - name: dictate
    buildsystem: simple
    sources:
      - type: dir
        path: ..
        skip:
          - .git
          - whisper.cpp
          - src
          - pkg
          - libs
          - low_latency_dictation
          - build-dir
          - .flatpak-builder
      - type: git
        url: https://github.com/ggml-org/whisper.cpp.git
        commit: 3e9b7d0fef3528ee2208da3cdb873a2c53d2ae2f
        dest: whisper.cpp
    build-commands:
      - make -f Makefile.linux GGML_VULKAN=ON
      - install -Dm755 dictate /app/bin/dictate
      - install -Dm644 flatpak/uk.co.electronstudio.Dictate.desktop /app/share/applications/uk.co.electronstudio.Dictate.desktop
      - sed -i "s/@VERSION@/$(cat cmd/dictate/VERSION)/; s/@DATE@/$(date +%Y-%m-%d)/" flatpak/uk.co.electronstudio.Dictate.metainfo.xml
      - install -Dm644 flatpak/uk.co.electronstudio.Dictate.metainfo.xml /app/share/metainfo/uk.co.electronstudio.Dictate.metainfo.xml
      - install -Dm644 assets/dictate.svg /app/share/icons/hicolor/scalable/apps/uk.co.electronstudio.Dictate.svg
      - |
        for size in 16 24 32 48 64 96 128 256; do
          mkdir -p "/app/share/icons/hicolor/${size}x${size}/apps"
          rsvg-convert -w "$size" -h "$size" assets/dictate.svg \
            -o "/app/share/icons/hicolor/${size}x${size}/apps/uk.co.electronstudio.Dictate.png"
        done
