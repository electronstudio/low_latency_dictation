app-id: uk.co.electronstudio.Dictate
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: dictate.sh
separate-locales: false
finish-args:
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --socket=pulseaudio
  - --device=all
  - --talk-name=org.freedesktop.Notifications
build-options:
  append-path: /usr/lib/sdk/golang/bin
  env:
    GOFLAGS: "-buildvcs=false -mod=vendor"
    GOCACHE: /run/build/dictate/.gocache
    GOPATH: /run/build/dictate/.gopath
    GOMODCACHE: /run/build/dictate/.gopath/pkg/mod
modules:
  - name: spirv-headers
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_INSTALL_PREFIX=/app
    sources:
      - type: git
        url: https://github.com/KhronosGroup/SPIRV-Headers.git
        tag: vulkan-sdk-1.4.321.0
        commit: 2a611a970fdbc41ac2e3e328802aed9985352dca
  - name: dictate
    buildsystem: simple
    sources:
      - type: dir
        path: ..
        skip:
          - .git
          - whisper.cpp
          - src
          - pkg
          - libs
          - ouput.log
          - low_latency_dictation
          - low-latency-dictation-git-0.2.0.r59.db2cd10-1-x86_64.pkg.tar.zst
      - type: git
        url: https://github.com/ggml-org/whisper.cpp.git
        commit: 3e9b7d0fef3528ee2208da3cdb873a2c53d2ae2f
        dest: whisper.cpp
    build-commands:
      - make -f Makefile.linux GGML_VULKAN=ON
      - install -Dm755 dictate /app/bin/dictate
      - install -Dm755 flatpak/dictate.sh /app/bin/dictate.sh
      - install -Dm644 flatpak/uk.co.electronstudio.Dictate.desktop /app/share/applications/uk.co.electronstudio.Dictate.desktop
      - install -Dm644 flatpak/uk.co.electronstudio.Dictate.metainfo.xml /app/share/metainfo/uk.co.electronstudio.Dictate.metainfo.xml
      - install -Dm644 assets/dictate.svg /app/share/icons/hicolor/scalable/apps/uk.co.electronstudio.Dictate.svg
      - install -Dm644 assets/dictate.png /app/share/icons/hicolor/256x256/apps/uk.co.electronstudio.Dictate.png
