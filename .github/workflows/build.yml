name: Build

on:
  push:
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake git libasound2-dev wget
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -qq
          sudo apt-get install -y vulkan-sdk

      - name: Build SDL
        run: |
          wget https://github.com/libsdl-org/SDL/archive/refs/tags/release-2.32.8.tar.gz
          tar xvfz release-2.32.8.tar.gz
          mkdir build && cd build
          cmake ../SDL-release-2.32.8 -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=OFF -DSDL_STATIC=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build . --config Release --parallel
          sudo cmake --install .

      - name: Build
        run: make -f Makefile.linux GO_LDFLAGS="-s -w"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dictate-linux-x86_64
          path: ./dictate

  build-mac-arm64:
    runs-on: macos-26
    env:
      MACOSX_DEPLOYMENT_TARGET: 11.0
      CGO_LDFLAGS_ALLOW: ".*"

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"

      - name: Build SDL
        run: |
          wget https://github.com/libsdl-org/SDL/archive/refs/tags/release-2.32.8.tar.gz
          tar xvfz release-2.32.8.tar.gz
          mkdir build
          cd build
          cmake ../SDL-release-2.32.8 -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DSDL_SHARED=OFF -DSDL_STATIC=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          sudo cmake --install .

      - name: Build
        run: |
          make -f Makefile.macos GO_LDFLAGS="-s -w"

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: dictate-macos-arm64
          path: ./dictate

  build-mac-x86_64:
    runs-on: macos-15-intel
    env:
      # libwhsiper wont compile on 10.14
      MACOSX_DEPLOYMENT_TARGET: 10.15
      CGO_LDFLAGS_ALLOW: ".*"

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"

      - name: Build SDL
        run: |
          wget https://github.com/libsdl-org/SDL/archive/refs/tags/release-2.32.8.tar.gz
          tar xvfz release-2.32.8.tar.gz
          mkdir build
          cd build
          cmake ../SDL-release-2.32.8 -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DSDL_SHARED=OFF -DSDL_STATIC=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          sudo cmake --install .

      - name: Build
        run: |
          make -f Makefile.macos GO_LDFLAGS="-s -w"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dictate-macos-x86_64
          path: ./dictate

  build-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26"

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-vulkan-loader
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-shaderc
            mingw-w64-ucrt-x86_64-spirv-headers
            mingw-w64-ucrt-x86_64-go

      - name: Build SDL
        shell: msys2 {0}
        run: |
          wget https://github.com/libsdl-org/SDL/archive/refs/tags/release-2.32.8.tar.gz
          tar xvfz release-2.32.8.tar.gz
          mkdir build && cd build
          cmake ../SDL-release-2.32.8 -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=OFF -DSDL_STATIC=ON -DCMAKE_INSTALL_PREFIX=/ucrt64
          cmake --build . --config Release --parallel
          cmake --install .

      - name: Build
        shell: msys2 {0}
        run: |
          go clean -cache
          make -f Makefile.windows GO_LDFLAGS="-s -w"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: dictate-windows-x86_64
          path: ./dictate.exe

  build-flatpak:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v7

      - name: Install flatpak
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08 \
            org.freedesktop.Sdk.Extension.golang//25.08

      - name: Build flatpak
        run: |
          flatpak-builder --user --repo repo --force-clean flatpak/uk.co.electronstudio.Dictate.yaml
          flatpak build-bundle repo low_latency_dictation.flatpak uk.co.electronstudio.Dictate

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: dictate-flatpak-x86_64
          path: ./low_latency_dictation.flatpak
